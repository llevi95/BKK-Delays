[project]
name = "template_package"
version = "0.1.0"
description = "template python package, do what you will, change, copy, remove, whatever"
authors = [
    { name = "Venczeli József", email = "venczeli.jozsef@budapest.hu" }
]
requires-python = ">=3.11,<3.14"
dependencies = [
    "pandas>=2.1.2",
    "dotenv>=0.9.9",
    "python-json-logger>=3.3.0",
    "openpyxl>=3.1.2",
    "numpy>=1.26.0",
    "psycopg2-binary>=2.9.0",
    "pymssql>=2.3.0",
    "gtfs-realtime-bindings>=2.0.0",
    "requests==2.32.3",
    "sqlalchemy==1.4.54",
]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
